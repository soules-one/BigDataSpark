version: '3.8'

services:
  postgres_dw:
    image: postgres:16-alpine
    container_name: postgres_star_dw
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "8088:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  clickhouse-db:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-reports
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: app
      CLICKHOUSE_PASSWORD: app
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch_data:/var/lib/clickhouse
    restart: unless-stopped

  mongodb_reports:
    image: mongo:7.0
    container_name: mongo_reports
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  spark_job:
    build:
      context: .
      dockerfile: dockerfile.spark
    container_name: spark_etl_runner
    depends_on:
      - postgres_dw
      - clickhouse-db
      - mongodb_reports
    volumes:
      - ./data:/opt/spark/work-dir/data
      - ./scripts:/opt/spark/work-dir/scripts
    restart: "no"

volumes:
  pg_data:
  ch_data:
  mongo_data: